schema: spec-driven

context: |
  产品：RelayFlow — 可自托管的企业协作平台（即时通讯 + 文档 + 工作流）。
  部署场景：私有化 / 内网 / 离线自部署；不对组织规模设产品级人数上限（容量由部署与运维决定）。

  仓库布局：
  - 根目录 = Java Maven 父工程（非扁平单 src/ 结构）
  - web/ = 前端子工程（Vue 3 + TypeScript + Vite + Nuxt UI v4）
  - deploy/ = Docker Compose
  - db/ = 初始化 SQL
  - openspec/ = 规格与变更

  V1 后端技术栈：
  - Java 21、Spring Boot 3.4.x、Maven 多模块
  - PostgreSQL、Redis、MinIO、Flyway、MyBatis-Plus
  - Spring Security 6 + JWT、Spring WebSocket
  V1 后端运行时：
  - 微服务就绪的模块化单体：单一 relayflow-server 加载 system/infra/im 的 *-biz
  - Maven：各域 *-api + *-biz；跨域仅 *-api；禁止 *-biz → *-biz
  - 数据库 V1：单 PostgreSQL 库，表前缀 sys_/infra_/im_ 逻辑分域
  - Phase 2（以后）：Gateway + Nacos + *-server + 分库；详见 distributed-backend-v1
  - 不引入 V1：Gateway、Nacos、独立 *-server

  Maven 模块（V1 启用）：
  - relayflow-dependencies（BOM）
  - relayflow-framework/*（Starter）
  - relayflow-module-system（api + biz）
  - relayflow-module-infra（api + biz）
  - relayflow-module-im（api + biz）
  - relayflow-module-task（api + biz）
  - relayflow-server（入口）
  - relayflow-module-bpm — V1.1 deferred（archive/2026-07-16-bpm-v1）；恢复前 server 不加载

  V1.1 协作扩展（已归档 / deferred，见 api-integration-board）：
  - notify-inbox-v2 — archived / SUPERSEDED（写真源改 Bot）
  - workspace-search-v1 — archived（已实现）
  - bpm-v1 — deferred（Flowable 通用审批；短期内不实现）

  模块规则：
  - 各业务域拆分为 *-api（契约）与 *-biz（实现）
  - *-biz 仅可依赖其他 *-api，不得依赖其他 *-biz
  - 表前缀：sys_、infra_、im_、task_、bpm_

  API 约定：
  - 管理端 REST：/admin-api/{module}/
  - 用户端 REST：/app-api/{module}/
  - WebSocket：/infra/ws
  - 统一响应：code=0 表示成功，HTTP 200；详见 docs/dev/api.md

  前端路由（web/）：
  - 管理端页面路由必须以 /admin 开头，对应 views/admin/ 与 /admin-api
  - 用户端页面路由 V1 暂不限前缀，对应 /app-api
  - 详见 docs/dev/code-style.md

  数据库约定：
  - 主键：雪花 ID（非数据库自增）
  - 公共字段：create_time / update_time / deleted（0=未删，1=已删）
  - Flyway 命名：V{major}.{minor}.{patch}.{seq}__{description}.sql，前三段跟产品 SemVer，第四段同版本内序号；详见 docs/dev/database.md

  协作约定：
  - Commit 中文 + Conventional Commits；现阶段允许直接 push main
  - 详见 CONTRIBUTING.md

  前端（web/）：Vue 3、TypeScript、Vite、Nuxt UI v4、Pinia、Vue Router
  前端 UI 规则：.cursor/rules/frontend-nuxt-ui.mdc
  前端设计：openspec/changes/archive/2026-06-30-adopt-vue-frontend/design.md
  领域规格：deployment/、system/、infra/、im/、workflow/（后续）
  架构详情：docs/dev/architecture.md
  Phase 2 微服务：openspec/changes/distributed-backend-v1/design.md
  开发约定：docs/dev/（api.md、database.md、code-style.md、frontend-first-workflow.md、vertical-slice-workflow.md、parallel-lane-workflow.md、admin-ui-workflow.md）
  AI 编码入口：根目录 AGENTS.md（导引，非全文）
  实现工作流（必读）：.cursor/rules/implementation-workflow.mdc
  前端优先（业务切片必读）：docs/dev/frontend-first-workflow.md、.cursor/rules/vertical-slice-workflow.mdc

  当前阶段：脚手架、租户就绪基础（`tenant-ready-foundation`）、登录与 IM/组织纵向切片已就绪；业务功能按 **前端优先纵向切片**（-web → -api → -integrate）推进。唯一登录页 /app/login。禁止一次实现整套 V1；禁止先堆后端无 UI（[平台] 除外）。

rules:
  proposal:
    - 说明影响的领域与 Maven 模块
    - 明确变更是否涉及 Java 根目录、web/ 或 deploy/
    - 说明自部署场景下的回滚 / 迁移影响
  specs:
    - 使用「需求 + 场景（给定/当/那么）」结构
    - 规范性表述使用「应 / 必须」
    - 新增行为前先查阅 openspec/specs/
  design:
    - 遵循 Maven 多模块布局；前端仅位于 web/
    - 记录端口、环境变量、Flyway 迁移
    - 说明离线 / 内网部署影响
  tasks:
    - "带 UI 的业务切片默认前端优先：{slice}-web → {slice}-api → {slice}-integrate；见 docs/dev/frontend-first-workflow.md"
    - "契约由 -web lane 起草至 openspec/lanes/{slice}/contract.md；-api 按 contract 实现"
    - "看板 docs/dev/api-integration-board.md；单 change tasks 顺序：前端 → 后端 → 联调"
    - 管理端 UI 定调（admin-ui-prototype 等）仍为更早的 UI 例外
    - "[平台] 无 UI 保持单 change 后端先行"
    - 单次 change ≤10 条 checkbox；须可验证（pnpm build、mvn compile、openspec validate）
  apply:
    - 实现前读取 openspec/changes/<change>/tasks.md，仅完成其中未勾选项
    - 必读 docs/dev/frontend-first-workflow.md
    - "change 名以 -web 结尾：先做 UI+Mock+contract；读 parallel-lane-frontend.mdc"
    - "change 名以 -api 结尾：前置 contract 已存在；读 parallel-lane-backend.mdc"
    - change 名以 `-integrate` 结尾：前置 `-api` 与 `-web` tasks 须已完成；负责联调与 validate
    - 实现前读取 .cursor/rules/implementation-workflow.mdc、vertical-slice-workflow.mdc 与 docs/dev/vertical-slice-workflow.md
    - 管理端 UI change（admin-ui-prototype、admin-ui-design-direction、admin-login-slice）须先读 docs/dev/admin-ui-workflow.md
    - 含 web/ 的切片完成前必须 pnpm build；有 UI 须说明浏览器验证路径
    - 完成前运行 tasks 对应的验证命令，无输出证据不得声称完成
    - 骨架未就绪时不得编写业务域代码
